spring:
  data:
    redis:
      host: redis
      port: 6379
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://auth-server:8080/oauth2/jwks
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: echo-route
              uri: http://echo-preauthorized:8081
              predicates:
                - Path=/echo/**
              filters:
                - StripPrefix=1
                - RemoveRequestHeader=Cookie

permissions:
  service:
    base-url: http://permissions:8082
  cache:
    key-prefix: "user-permissions:"
    ttl-seconds: 300
    redis:
      enabled: true
