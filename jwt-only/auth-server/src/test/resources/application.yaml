spring:
  datasource:
    url: jdbc:h2:mem:auth;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
  security:
    oauth2:
      authorizationserver:
        client:
          demo:
            registration:
              client-id: demo-client
              client-secret: "{noop}demo-secret"
              client-authentication-methods:
                - client_secret_basic
              authorization-grant-types:
                - client_credentials
              scopes:
                - api.read
